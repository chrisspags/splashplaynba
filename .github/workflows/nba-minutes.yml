name: NBA Minutes Agent

on:
  workflow_dispatch:  # Manual trigger only from GitHub Actions UI

permissions:
  contents: write           # Needed to commit minutes-data.json

jobs:
  minutes-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run minutes agent (Claude only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/minutes_agent.py

      - name: Commit and push minutes-data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save generated files
          cp minutes-data.json /tmp/minutes-data.json
          cp minutes-export.csv /tmp/minutes-export.csv 2>/dev/null || true
          # Get latest remote (may have new commits from Colab/site)
          git fetch origin main
          git reset --hard origin/main
          # Restore generated files on top of latest
          cp /tmp/minutes-data.json minutes-data.json
          cp /tmp/minutes-export.csv minutes-export.csv 2>/dev/null || true
          git add minutes-data.json minutes-export.csv
          git diff --cached --quiet || git commit -m "Update minutes-data.json $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Upload CSV for download
        uses: actions/upload-artifact@v4
        if: ${{ hashFiles('minutes-export.csv') != '' }}
        with:
          name: minutes-export
          path: minutes-export.csv
          retention-days: 30


