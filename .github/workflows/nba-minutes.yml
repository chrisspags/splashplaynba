name: NBA Minutes Agent

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  minutes-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run minutes agent (Claude only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python scripts/minutes_agent.py

      - name: Commit and push minutes-data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save generated file
          cp minutes-data.json /tmp/minutes-data.json
          # Get latest remote (may have new commits from Colab notebook)
          git fetch origin main
          git reset --hard origin/main
          # Restore our generated file on top of latest
          cp /tmp/minutes-data.json minutes-data.json
          git add minutes-data.json
          git diff --cached --quiet || git commit -m "Update minutes-data.json $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push


