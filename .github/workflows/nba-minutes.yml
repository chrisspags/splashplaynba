name: NBA Minutes Agent

on:
  schedule:
    - cron: '0 19 * * *'  # 2:00 PM ET (19:00 UTC) daily
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

permissions:
  contents: write           # Needed to commit minutes-data.json

jobs:
  minutes-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}

      - name: Cache NBA API data
        uses: actions/cache@v4
        with:
          path: .nba-cache/
          key: nba-minutes-${{ github.run_number }}
          restore-keys: |
            nba-minutes-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run minutes agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/minutes_agent.py

      - name: Commit and push minutes-data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add minutes-data.json
          git diff --cached --quiet || git commit -m "Update minutes-data.json $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
